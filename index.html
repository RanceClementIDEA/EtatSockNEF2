<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>NEF2 – Visualisation des Stocks (Optimisé)</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Librairies -->
    <script src="xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- App optimisée -->
    <script defer src="app.js"></script>
</head>

<body>

<!-- ============================ HEADER ============================ -->
<header id="appHeader">
    <span class="sapIcon"></span>
    <h1>NEF2 – Visualisation des Stocks</h1>
</header>

<!-- ============================ TOOLBAR ============================ -->
<div id="toolbar">

    <!-- Import Excel -->
    <label class="fioriBtn">
        <span class="sapIcon"></span>
        Importer Excel
        <input type="file" id="fileInput" hidden accept=".xlsx">
    </label>

    <!-- Filtres -->
    <input id="filterText" type="text" placeholder="Recherche…">
    <input id="filterA" type="text" placeholder="Allée">
    <input id="filterT" type="number" placeholder="Travée">
    <input id="filterN" type="text" placeholder="Niveau">
    <input id="filterPos" type="number" placeholder="Pos">

    <select id="filterStatus">
        <option value="">Status</option>
        <option value="plein">Plein</option>
        <option value="moyen">Moyen</option>
        <option value="faible">Faible</option>
        <option value="vide">Vide</option>
    </select>

    <select id="filterGest">
        <option value="">Gest</option>
    </select>

    <!-- Onglets -->
    <button id="btnTable" class="fioriTab">
        <span class="sapIcon"></span> Tableau
    </button>

    <button id="btnPlan" class="fioriTab">
        <span class="sapIcon"></span> Plan 2D
    </button>

    <button id="btnDashboard" class="fioriTab">
        <span class="sapIcon"></span> Dashboard
    </button>

    
</div>

<!-- ============================ PANEL STATS ============================ -->
<aside id="sideStats" class="closed">
    <div class="sideHeader">
        <span class="sapIcon"></span>
        <h2>Statistiques</h2>
    </div>

    <div class="statItem">
        <span>Taux de remplissage</span>
        <strong id="sideFillRate">0%</strong>
    </div>

    <div class="statItem">
        <span>Emplacements filtrés</span>
        <strong id="sideCount">0</strong>
    </div>

    <div class="statItem">
        <span>Stock total filtré</span>
        <strong id="sideQty">0</strong>
    </div>

    <h3>Status</h3>
    <canvas id="statusChart"></canvas>
</aside>

<div id="statsToggle">
    <span class="sapIcon"></span>
</div>

<!-- ============================ CONTENU ============================ -->
<main>

    <!-- ===== TABLEAU ===== -->
    <section id="tableView" class="tab active">
        <div id="tableWrapper" class="fioriCard">
            <table id="tableStock">
                <thead>
                    <tr>
                        <th>Empl.</th>
                        <th>A</th>
                        <th>T</th>
                        <th>N</th>
                        <th>Pos</th>
                        <th>Article(s)</th>
                        <th>Qté tot</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div id="pagination" class="fioriPagination">
            <button id="pagePrev">⟨</button>
            <span id="pageInfo"></span>
            <button id="pageNext">⟩</button>
        </div>
    </section>

    <!-- ===== PLAN 2D ===== -->
    <section id="planView" class="tab">
        <canvas id="plan2d" width="3000" height="2000"></canvas>
        <div id="tooltip"></div>
    </section>

    <!-- ===== DASHBOARD ===== -->
    <section id="dashboardView" class="tab">
        <h2>Dashboard – KPI & Graphiques</h2>

        <div class="dashboard-toolbar">
            <label>Type de graphique :</label>
            <select id="chartTypeSelect">
                <option value="bar">Barres</option>
                <option value="pie">Camembert</option>
                <option value="doughnut">Donut</option>
                <option value="line">Ligne</option>
                <option value="radar">Radar</option>
            </select>
        </div>
<div class="dashboard-mode">
    <label>Mode d’analyse :</label>
    <select id="dashboardMode">
        <option value="locations">Par emplacements</option>
        <option value="articles">Par articles</option>
    </select>
</div>
        <div id="kpiDashboard"></div>

        <div class="dashboard-charts">
            <div class="chart-card">
                <h3>Répartition des statuts</h3>
                <canvas id="chartStatus"></canvas>
            </div>

            <div class="chart-card">
                <h3>Stock par allée</h3>
                <canvas id="chartAllee"></canvas>
            </div>

            <div class="chart-card">
                <h3>Top 10 articles</h3>
                <canvas id="chartTop10"></canvas>
            </div>
<div class="chart-card">
    <h3>Top 5 gestionnaires</h3>
    <canvas id="chartGest" height="180"></canvas>
</div>
        </div>
    </section>

</main>

</body>
</html>
``
